name: Create Release

on:
  push:
    tags:
      - '*/*' # Matches component/version (e.g. server/0.9.0, web/0.15.0)

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: bash scripts/create-releases.sh --apply --tag "${{ github.ref_name }}"

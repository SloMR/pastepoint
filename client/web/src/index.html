<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <script>
      (function () {
        // Check localStorage first
        var storedTheme = localStorage.getItem('theme_preference');
        // Apply theme immediately before any content renders
        if (
          storedTheme === 'dark' ||
          (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <title>PastePoint – Encrypted File Sharing &amp; Real-Time Messaging</title>
    <base href="/" />

    <!-- Core Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    />

      content="pastepoint, paste point, PastePoint, Paste Point, secure file sharing, encrypted messaging, peer-to-peer transfer, private file sharing, WebRTC chat, direct file transfer, real-time messaging, zero tracking, no cloud, local network sharing"
    />

<!-- MARK: - QR Code Popup -->
@if (isOpen) {
  <div
    class="fixed inset-0 grid place-items-end bg-black/80 z-[10000] sm:place-content-center"
    (click)="closed.emit()"
  >
    <div
      class="w-full rounded-2xl rounded-b-none bg-white px-6 py-6 animate-slide-up dark:bg-baseDark sm:w-[380px] sm:rounded-b-2xl sm:px-6 sm:pb-6"
      (click)="$event.stopPropagation()"
    >
      <div class="flex w-full flex-col gap-4">
        <!-- Close button -->
        <div class="flex w-full" [ngClass]="isRTL ? 'justify-start' : 'justify-end'">
          <button
            (click)="closed.emit()"
            class="flex items-center justify-center rounded-full p-2 transition-colors hover:bg-gray-100 dark:hover:bg-gray-700"
            aria-label="Close QR Code"
            title="Close QR Code"
          >
            <img
              src="/icons/cross-close.svg"
              alt="Close"
              title="Close"
              class="h-4 w-4"
              loading="lazy"
              width="16"
              height="16"
            />
          </button>
        </div>
        <!-- QR Code Container -->
        <div class="flex w-full items-center justify-center">
          <div
            class="flex items-center justify-center rounded-xl border-2 bg-white p-4 shadow-sm border-borderLight dark:border-borderDark dark:bg-white"
          >
            <ng-content>
              <!-- Loading spinner (default content) -->
              @if (isGenerating) {
                <div
                  class="flex items-center justify-center w-[250px] h-[250px] sm:w-[300px] sm:h-[300px]"
                >
                  <svg
                    aria-hidden="true"
                    class="h-14 w-14 animate-spin text-gray-200 fill-brand dark:text-gray-600"
                    viewBox="0 0 100 101"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                      fill="currentColor"
                    />
                    <path
                      d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                      fill="currentFill"
                    />
                  </svg>
                </div>
              }
            </ng-content>
          </div>
        </div>
        <div class="flex w-full items-center justify-center">
          <p class="text-xs font-expoArabicMedium text-content dark:text-contentMuted">
            {{ 'SCAN_QR_CODE_TO_JOIN_THE_SESSION' | translate }}
          </p>
        </div>
      </div>
    </div>
  </div>
}

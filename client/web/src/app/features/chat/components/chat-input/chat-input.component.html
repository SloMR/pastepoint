<!-- MARK: - Message Input -->
<form
  #messageForm="ngForm"
  (submit)="messageSubmit.emit(messageForm); $event.preventDefault()"
  class="flex w-full"
  (dragover)="handleDragOver($event)"
  (dragleave)="handleDragLeave($event)"
  (dragenter)="handleDragEnter()"
  (drop)="handleDrop($event)"
>
  <div
    class="relative mt-6 mb-0 flex w-full items-center justify-end gap-2 rounded-xl px-4 py-3 min-h-[110px]"
    [ngClass]="
      message.length > 0
        ? 'border border-inputBackground dark:border-textVeryMuted '
        : 'bg-inputBackground dark:bg-borderDark'
    "
  >
    <!-- MARK: - Drag and Drop Overlay -->
    @if (isDragging) {
      <div
        class="absolute inset-0 z-10 flex items-center justify-center rounded-lg border-2 border-dashed bg-black/50 text-white backdrop-blur-sm border-primary-300 dark:border-secondary-400"
      >
        <div class="flex flex-row items-center gap-2">
          <svg
            class="h-4 w-4 text-brand dark:text-brandDark"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
            />
          </svg>
          <span class="text-xs font-medium">{{ 'DROP_FILES_HERE' | translate }}</span>
        </div>
      </div>
    }
    <div class="flex w-full flex-col items-stretch gap-2">
      <textarea
        #messageTextarea
        [ngModel]="message"
        (ngModelChange)="messageChange.emit($event); autoResize.emit()"
        name="message"
        rows="1"
        class="w-full resize-none overflow-hidden rounded-lg border-none bg-transparent px-0 py-2 font-medium outline-none font-expoArabicMedium text-content min-h-[40px] max-h-[120px] dark:text-contentMuted"
        [placeholder]="(isDragging ? 'DROP_FILES_HERE' : 'TYPE_YOUR_MESSAGE') | translate"
        (keydown.enter)="enterKey.emit({ event: $any($event), form: messageForm })"
        (input)="autoResize.emit()"
      >
      </textarea>

      <div class="flex w-full items-center justify-between">
        <div
          class="flex items-center gap-6 px-2"
          [ngClass]="isRTL ? 'flex-row-reverse' : 'flex-row'"
        >
          <button
            type="button"
            [disabled]="hasNoConnectedPeers"
            (click)="fileInput.click()"
            class="p-0 border-0 bg-transparent disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
            [attr.aria-label]="'Attach Files'"
            title="Attach Files"
          >
            <img
              [src]="'/icons/link.svg'"
              alt=""
              class="h-5 w-5"
              loading="lazy"
              width="20"
              height="20"
            />
          </button>
          <button
            type="button"
            [disabled]="hasNoConnectedPeers"
            (mouseenter)="openEmojiPicker()"
            (mouseleave)="handleEmojiIconMouseLeave()"
            class="p-0 border-0 bg-transparent disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
            [attr.aria-label]="'Open emoji picker'"
            title="Open emoji picker"
          >
            <img
              [src]="'/icons/emoji.svg'"
              alt=""
              class="h-5 w-5"
              loading="lazy"
              width="20"
              height="20"
            />
          </button>
        </div>
        <button
          [disabled]="isSendDisabled"
          class="flex items-center justify-center gap-2 rounded-lg p-2 text-white bg-brand min-w-[100px] h-[40px] dark:bg-brandDark md:min-w-[124px] md:h-[44px] disabled:opacity-50 disabled:cursor-not-allowed"
          [ngClass]="isRTL ? 'flex-row-reverse' : 'flex-row'"
        >
          <span class="text-base font-expoArabicMedium">{{ 'SEND' | translate }}</span>
          <img
            [src]="'/icons/send.svg'"
            alt="Send"
            title="Send"
            class="h-5 w-5"
            loading="lazy"
            width="20"
            height="20"
          />
        </button>
        <input
          type="file"
          #fileInput
          (change)="filesAttached.emit($event)"
          multiple
          class="hidden"
        />
      </div>
    </div>
    <!-- MARK: - Emoji Picker -->
    <div
      class="absolute bottom-full z-10 w-72 rounded-lg border shadow-lg border-primary-300 bg-primary-100 dark:border-secondary-600 dark:bg-secondary-800"
      [ngClass]="isRTL ? 'right-0' : 'left-0'"
      [ngStyle]="{
        opacity: isEmojiPickerVisible ? '1' : '0',
        pointerEvents: isEmojiPickerVisible ? 'auto' : 'none',
      }"
      (mouseenter)="isHoveringOverPicker = true"
      (mouseleave)="isHoveringOverPicker = false; isEmojiPickerVisible = false"
    >
      @if (isEmojiPickerVisible || isHoveringOverPicker) {
        <emoji-picker
          [class.dark]="isDarkMode"
          (emoji-click)="addEmoji($any($event))"
        ></emoji-picker>
      }
    </div>
  </div>
</form>
